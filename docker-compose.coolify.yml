#
# Coolify deployment for awardsapp/tambo-genui (self-hosted Genui).
#
# Differences from docker-compose.yml (local dev):
#   - No host port mappings (Coolify routes via Traefik on FQDN)
#   - SERVICE_FQDN_* magic vars for automatic FQDN routing
#   - migrate service runs Drizzle migrations before web/api start
#   - postgres + minio internal-only (Coolify Docker network)
#   - container_name omitted (Coolify generates per-deploy names)
#   - genui-web and genui-api built from this repo (Coolify builds via build context)
#
# Required Coolify Application config:
#   FQDNs:    https://ai.awardsapp.ai, https://ai-api.awardsapp.ai
#             (drives via the docker_compose_domains JSON field on the
#             application record — NOT SERVICE_FQDN_* env vars; Coolify
#             auto-generates Traefik labels from that field)
#   Build:    Dockerfile (per-service, see build.dockerfile entries below)
#   Branch:   main
#   Source:   github.com/awardsapp/tambo-genui
#
# Required env vars (set in Coolify Application > Environment Variables):
#   POSTGRES_PASSWORD       - random 32-char (gopass: TAMBO_POSTGRES_PASSWORD)
#   API_KEY_SECRET          - random 32-char (gopass: TAMBO_API_KEY_SECRET)
#   PROVIDER_KEY_SECRET     - random 32-char (gopass: TAMBO_PROVIDER_KEY_SECRET)
#   NEXTAUTH_SECRET         - random 32-char (gopass: TAMBO_NEXTAUTH_SECRET)
#   OPENAI_API_KEY          - shared with awardsapp web (org OpenAI key)
#
# Optional (sentinel "" defaults if unset):
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET   - Google SSO for dashboard
#   GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET   - GitHub SSO for dashboard
#   RESEND_API_KEY                            - email notifications
#   POSTHOG_API_KEY, POSTHOG_HOST             - usage analytics
#   LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY  - LLM tracing
#   SENTRY_DSN                                - error tracking

volumes:
  genui_postgres_data:

services:
  # ---- Database migrations (runs once, exits 0) ----
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    # api/Dockerfile uses npm (not pnpm). Run drizzle-kit directly from the
    # pruned db package — drizzle.config.ts in packages/db reads DATABASE_URL.
    working_dir: /workspace/packages/db
    command: ["npx", "drizzle-kit", "migrate"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-genui}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ---- PostgreSQL (internal-only, no host port) ----
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-genui}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - genui_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-genui}",
        ]
      interval: 8s
      timeout: 5s
      retries: 4
      start_period: 20s

  # ---- API (NestJS) — exposed at https://ai-api.awardsapp.ai ----
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_ENV: production
    restart: unless-stopped
    # `expose:` populates Docker's NetworkSettings.Ports so Traefik's docker
    # provider can auto-discover the upstream port. Without this, Coolify
    # generates router labels but Traefik logs "port is missing" and returns
    # HTTP 503 "no available server" — `EXPOSE 3000` in the Dockerfile is not
    # enough because the multi-stage build's final stage doesn't inherit it.
    expose:
      - "3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-genui}
      API_KEY_SECRET: ${API_KEY_SECRET}
      PROVIDER_KEY_SECRET: ${PROVIDER_KEY_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EXTRACTION_OPENAI_API_KEY: ${EXTRACTION_OPENAI_API_KEY:-}
      FALLBACK_OPENAI_API_KEY: ${FALLBACK_OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_AUDIENCE_ID: ${RESEND_AUDIENCE_ID:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      SLACK_OAUTH_TOKEN: ${SLACK_OAUTH_TOKEN:-}
      SLACK_TEAM_ID: ${SLACK_TEAM_ID:-}
      INTERNAL_SLACK_USER_ID: ${INTERNAL_SLACK_USER_ID:-}
      DISALLOWED_EMAIL_DOMAINS: ${DISALLOWED_EMAIL_DOMAINS:-}
      ALLOWED_LOGIN_DOMAIN: ${ALLOWED_LOGIN_DOMAIN:-awardsapp.ai}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      ALLOW_LOCAL_MCP_SERVERS: ${ALLOW_LOCAL_MCP_SERVERS:-false}
      EMAIL_FROM_DEFAULT: ${EMAIL_FROM_DEFAULT:-noreply@awardsapp.ai}
      EMAIL_FROM_PERSONAL: ${EMAIL_FROM_PERSONAL:-marcus@awardsapp.ai}
      EMAIL_REPLY_TO_PERSONAL: ${EMAIL_REPLY_TO_PERSONAL:-marcus@awardsapp.ai}
      EMAIL_REPLY_TO_SUPPORT: ${EMAIL_REPLY_TO_SUPPORT:-support@awardsapp.ai}
      SENTRY_DSN: ${SENTRY_DSN:-}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-}
    # Healthcheck uses CMD-SHELL so $$HOSTNAME expands inside the container.
    # Tambo's Next.js / NestJS apps bind to the container's hostname/eth0 IP,
    # not 0.0.0.0 — so wget on `localhost:3000` fails with connection refused
    # even though the app is healthy. Container marked `unhealthy` triggers
    # Traefik to filter and return 503. The Dockerfile already does the right
    # thing (wget http://${HOSTNAME}:${PORT}); replicate that pattern here.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://$$HOSTNAME:3000/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ---- Web (Next.js) — exposed at https://ai.awardsapp.ai ----
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NODE_ENV: production
    restart: unless-stopped
    # See api service comment above — `expose:` is required for Traefik's
    # docker provider to auto-discover the upstream port for FQDN routing.
    expose:
      - "3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
      # Browser-side: must use public HTTPS URL (sent in HTML to client)
      NEXT_PUBLIC_TAMBO_API_URL: ${NEXT_PUBLIC_TAMBO_API_URL:-https://ai-api.awardsapp.ai}
      NEXT_PUBLIC_TAMBO_API_KEY: ${NEXT_PUBLIC_TAMBO_API_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-genui}
      API_KEY_SECRET: ${API_KEY_SECRET}
      PROVIDER_KEY_SECRET: ${PROVIDER_KEY_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_AUDIENCE_ID: ${RESEND_AUDIENCE_ID:-}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      ALLOW_LOCAL_MCP_SERVERS: ${ALLOW_LOCAL_MCP_SERVERS:-false}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      EMAIL_FROM_DEFAULT: ${EMAIL_FROM_DEFAULT:-noreply@awardsapp.ai}
      EMAIL_FROM_PERSONAL: ${EMAIL_FROM_PERSONAL:-marcus@awardsapp.ai}
      EMAIL_REPLY_TO_SUPPORT: ${EMAIL_REPLY_TO_SUPPORT:-support@awardsapp.ai}
      EMAIL_REPLY_TO_PERSONAL: ${EMAIL_REPLY_TO_PERSONAL:-marcus@awardsapp.ai}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://ai.awardsapp.ai}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_ORG: ${NEXT_PUBLIC_SENTRY_ORG:-}
      NEXT_PUBLIC_SENTRY_PROJECT: ${NEXT_PUBLIC_SENTRY_PROJECT:-}
      TAMBO_WHITELABEL_ORG_NAME: ${TAMBO_WHITELABEL_ORG_NAME:-AwardsApp}
      NEXT_PUBLIC_TAMBO_WHITELABEL_ORG_NAME: ${NEXT_PUBLIC_TAMBO_WHITELABEL_ORG_NAME:-AwardsApp}
      TAMBO_WHITELABEL_ORG_LOGO: ${TAMBO_WHITELABEL_ORG_LOGO:-}
      NEXT_PUBLIC_TAMBO_WHITELABEL_ORG_LOGO: ${NEXT_PUBLIC_TAMBO_WHITELABEL_ORG_LOGO:-}
    # See api healthcheck comment above. Next.js standalone server binds to
    # the container's hostname (HOSTNAME env var, set automatically by Docker
    # to the short container ID) — not 0.0.0.0 — so localhost:3000 inside the
    # container connects to nothing. The Dockerfile correctly uses
    # `wget http://${HOSTNAME}:${PORT}` for HEALTHCHECK; we replicate the
    # same pattern here so this compose-level healthcheck doesn't override
    # the Dockerfile's correct one with a broken localhost-based test.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://$$HOSTNAME:3000/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
